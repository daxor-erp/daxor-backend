name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest
    
    - name: Install dependencies
      run: bun install
    
    - name: Run codegen
      run: cd apps/api && bun run codegen
    
    - name: Lint
      run: bun run lint
    
    - name: Build
      run: bun run build
    
    - name: Start server and test
      run: |
        cd apps/api
        timeout 30s bun run dev &
        sleep 10
        curl -f http://localhost:4000/ping || exit 1
