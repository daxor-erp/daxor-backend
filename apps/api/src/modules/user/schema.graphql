type ModulePermission {
	moduleKey: String!
	canCreate: Boolean!
	canUpdate: Boolean!
	canDelete: Boolean!
	canView: Boolean!
}

type User {
	id: ID!
	seqNo: String
	email: String!
	firstName: String!
	lastName: String!
	userType: String
	roles: [String!]
	status: String!
	organizationId: ID
	modulePermissions: [ModulePermission!]
	createdAt: String!
}

input ModulePermissionInput {
	moduleKey: String!
	canCreate: Boolean!
	canUpdate: Boolean!
	canDelete: Boolean!
	canView: Boolean!
}

type UserList {
	users: [User!]!
	total: Int!
	page: Int!
	limit: Int!
}

input CreateUserInput {
	email: String!
	firstName: String!
	lastName: String!
	password: String
	userType: String
	roles: [String!]
	organizationId: ID!
}

input UpdateUserInput {
	firstName: String
	lastName: String
	roles: [String!]
	status: String
}

extend type Query {
	user(id: ID!): User
	userByEmail(email: String!): User
	usersByRole(role: String!): [User!]!
	usersByOrganization(organizationId: ID!, page: Int, limit: Int, type: String, status: String, search: String): UserList!
}

extend type Mutation {
	createUser(input: CreateUserInput!): User!
	updateUser(id: ID!, input: UpdateUserInput!): User!
	deleteUser(id: ID!): User!
	setUserModulePermissions(userId: ID!, permissions: [ModulePermissionInput!]!): User!
}
