type SalesOrder {
	id: ID!
	seqNo: String!
	customerId: ID!
	clientId: ID
	quotationId: ID
	quotationStatus: String
	projectId: ID
	totalAmount: Float!
	status: String!
	orderDate: String!
	organizationId: ID!
	cashSale: Boolean!
	refundedAt: String
	refundAmount: Float
	refundMethod: String
	refundReferenceNumber: String
	refundNotes: String
	createdAt: String!
}

input CreateSalesOrderInput {
	customerId: ID!
	projectId: ID
	quotationId: ID
	quotationStatus: String
	totalAmount: Float!
	orderDate: String!
	organizationId: ID!
}

input UpdateSalesOrderInput {
	customerId: ID
	projectId: ID
	totalAmount: Float
	status: String
}

input RefundCashSaleInput {
	salesOrderId: ID!
	refundDate: String!
	refundMethod: String!
	referenceNumber: String
	amount: Float!
	notes: String
}

extend type Query {
	salesorder(id: ID!): SalesOrder
	salesorders(organizationId: ID!, page: Int, limit: Int, status: String, cashSale: Boolean): [SalesOrder!]!
	cashSalesRefundCandidates(organizationId: ID!): [SalesOrder!]!
}

extend type Mutation {
	createSalesOrder(input: CreateSalesOrderInput!): SalesOrder!
	updateSalesOrder(id: ID!, input: UpdateSalesOrderInput!): SalesOrder!
	deleteSalesOrder(id: ID!): SalesOrder!
	"""Draft → pending approval inbox for the Sales approver configured under Org admin → Approvals."""
	submitSalesOrder(id: ID!): SalesOrder!
	refundCashSale(input: RefundCashSaleInput!): SalesOrder!
}
