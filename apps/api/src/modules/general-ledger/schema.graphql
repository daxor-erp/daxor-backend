type GeneralLedger {
  id: ID!
  transactionNumber: String!
  transactionDate: String!
  transactionType: String!
  referenceModule: String!
  referenceId: String!
  debitAccount: String!
  creditAccount: String!
  amount: Float!
  currency: String!
  description: String!
  fiscalYear: String!
  fiscalPeriod: String!
  status: String!
  organizationId: String!
  createdBy: String!
  createdAt: String!
  updatedAt: String!
}

type ChartOfAccounts {
  id: ID!
  accountCode: String!
  accountNumber: String
  accountName: String!
  accountType: String!
  parentAccount: String
  level: Int!
  isActive: Boolean!
  organizationId: String!
  description: String
  createdAt: String!
  updatedAt: String!
}

input GeneralLedgerInput {
  transactionDate: String!
  transactionType: String!
  referenceModule: String!
  referenceId: String!
  debitAccount: String!
  creditAccount: String!
  amount: Float!
  currency: String
  description: String!
  fiscalYear: String!
  fiscalPeriod: String!
  organizationId: String!
}

input ChartOfAccountsInput {
  """accountCode is generated server-side based on accountType. Ignored if supplied."""
  accountCode: String
  """Optional human-entered identifier (e.g. legacy ledger number)."""
  accountNumber: String
  accountName: String!
  accountType: String!
  parentAccount: String
  level: Int
  isActive: Boolean
  organizationId: String!
  description: String
}

type TrialBalanceLine {
  accountCode: String!
  accountName: String!
  accountType: String!
  debit: Float!
  credit: Float!
  net: Float!
}

type FinancialStatementLine {
  accountCode: String!
  accountName: String!
  amount: Float!
}

type IncomeStatementReport {
  revenueLines: [FinancialStatementLine!]!
  totalRevenue: Float!
  cogsLines: [FinancialStatementLine!]!
  totalCogs: Float!
  grossProfit: Float!
  expenseLines: [FinancialStatementLine!]!
  totalOperatingExpense: Float!
  netIncome: Float!
}

type BalanceSheetReport {
  assetLines: [FinancialStatementLine!]!
  totalAssets: Float!
  liabilityLines: [FinancialStatementLine!]!
  totalLiabilities: Float!
  equityLines: [FinancialStatementLine!]!
  totalEquity: Float!
  totalLiabilitiesAndEquity: Float!
  balanced: Boolean!
}

extend type Query {
  generalLedger(id: ID!): GeneralLedger
  generalLedgers(organizationId: String!, page: Int, limit: Int, fiscalYear: String, status: String): [GeneralLedger!]!
  chartOfAccount(id: ID!): ChartOfAccounts
  chartOfAccounts(organizationId: String!, page: Int, limit: Int, accountType: String): [ChartOfAccounts!]!
  trialBalance(organizationId: String!): [TrialBalanceLine!]!
  incomeStatement(organizationId: String!): IncomeStatementReport!
  balanceSheet(organizationId: String!): BalanceSheetReport!
}

extend type Mutation {
  createGeneralLedger(input: GeneralLedgerInput!): GeneralLedger!
  createChartOfAccount(input: ChartOfAccountsInput!): ChartOfAccounts!
  updateChartOfAccount(id: ID!, input: ChartOfAccountsInput!): ChartOfAccounts!
  deleteChartOfAccount(id: ID!): Boolean!
}
