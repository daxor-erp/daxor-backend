type Vendor {
	id: ID!
	seqNo: String!
	name: String!
	contactPerson: String
	email: String
	phone: String
	address: String
	organizationId: ID!
	status: String!
	createdAt: String!
}

input CreateVendorInput {
	name: String!
	contactPerson: String
	email: String
	phone: String
	address: String
	organizationId: ID!
}

input UpdateVendorInput {
	name: String
	contactPerson: String
	email: String
	phone: String
	address: String
	status: String
}

type Query {
	vendor(id: ID!): Vendor
	vendors(organizationId: ID!, page: Int, limit: Int, search: String): [Vendor!]!
}

type Mutation {
	createVendor(input: CreateVendorInput!): Vendor!
	updateVendor(id: ID!, input: UpdateVendorInput!): Vendor!
	deleteVendor(id: ID!): Vendor!
}
