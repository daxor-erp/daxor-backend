type Task {
  id: ID!
  name: String!
  description: String
  assignedTo: ID
  status: String!
  priority: String!
  startDate: String
  dueDate: String
  completedAt: String
}

type Milestone {
  id: ID!
  name: String!
  description: String
  dueDate: String
  status: String!
  completedAt: String
}

input TaskInput {
  id: ID
  name: String!
  description: String
  assignedTo: ID
  status: String
  priority: String
  startDate: String
  dueDate: String
  completedAt: String
}

input MilestoneInput {
  id: ID
  name: String!
  description: String
  dueDate: String
  status: String
  completedAt: String
}

type ProductionPlanning {
  id: ID!
  docNumber: String!
  docDate: String!
  projectId: ID
  managerId: ID
  budget: Float
  actualCost: Float
  progress: Float
  tasks: [Task!]
  milestones: [Milestone!]
  status: String!
  organizationId: String!
  createdAt: String!
}

input ProductionPlanningInput {
  docDate: String!
  projectId: ID
  managerId: ID
  budget: Float
  actualCost: Float
  progress: Float
  tasks: [TaskInput!]
  milestones: [MilestoneInput!]
  status: String
  organizationId: String!
}

extend type Query {
  productionplanning(id: ID!): ProductionPlanning
  productionplannings(organizationId: String!, page: Int, limit: Int): [ProductionPlanning!]!
}

extend type Mutation {
  createProductionPlanning(input: ProductionPlanningInput!): ProductionPlanning!
  updateProductionPlanning(id: ID!, input: ProductionPlanningInput!): ProductionPlanning!
  deleteProductionPlanning(id: ID!): Boolean!
}
