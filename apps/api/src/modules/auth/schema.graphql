type AuthPayload {
	token: String!
	user: User!
}

input LoginInput {
	email: String!
	password: String!
}

input RegisterInput {
	email: String!
	password: String!
	firstName: String
	lastName: String
	organizationId: ID
}

extend type Query {
	me: User
}

extend type Mutation {
	login(input: LoginInput!): AuthPayload!
	register(input: RegisterInput!): AuthPayload!
}
