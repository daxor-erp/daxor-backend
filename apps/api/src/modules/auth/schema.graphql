type User {
	id: ID!
	email: String!
	firstName: String
	lastName: String
	roles: [String!]
	organizationId: ID
}

type AuthPayload {
	token: String!
	user: User!
}

input LoginInput {
	email: String!
	password: String!
}

input RegisterInput {
	email: String!
	password: String!
	firstName: String
	lastName: String
	organizationId: ID
}

type Query {
	me: User
}

type Mutation {
	login(input: LoginInput!): AuthPayload!
	register(input: RegisterInput!): AuthPayload!
}
