type SalaryProcessing {
  id: ID!
  docNumber: String!
  docDate: String!
  status: String!
  organizationId: String!
  createdAt: String!
  title: String
  remarks: String
  payPeriodStart: String
  payPeriodEnd: String
}

input SalaryProcessingInput {
  docDate: String!
  status: String
  organizationId: String!
  title: String
  remarks: String
  payPeriodStart: String
  payPeriodEnd: String
}

extend type Query {
  salaryprocessing(id: ID!): SalaryProcessing
  salaryprocessings(organizationId: String!, page: Int, limit: Int): [SalaryProcessing!]!
}

extend type Mutation {
  createSalaryProcessing(input: SalaryProcessingInput!): SalaryProcessing!
  updateSalaryProcessing(id: ID!, input: SalaryProcessingInput!): SalaryProcessing!
  deleteSalaryProcessing(id: ID!): Boolean!
}
