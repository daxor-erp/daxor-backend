type MRNLineItem {
  itemId: ID
  itemDescription: String!
  orderedQty: Float!
  receivedQty: Float!
  rejectedQty: Float
  unit: String
  unitPrice: Float!
  lineTotal: Float!
}

type MaterialReceipt {
  id: ID!
  mrnNumber: String!
  purchaseOrderId: ID
  purchaseOrderNumber: String
  vendorId: ID
  vendorName: String
  receiptDate: String!
  warehouseId: ID
  warehouseName: String
  lineItems: [MRNLineItem!]!
  totalAmount: Float!
  status: String!
  notes: String
  organizationId: ID!
  createdAt: String
  updatedAt: String
}

input MRNLineItemInput {
  itemId: ID
  itemDescription: String!
  orderedQty: Float!
  receivedQty: Float!
  rejectedQty: Float
  unit: String
  unitPrice: Float!
  lineTotal: Float!
}

input CreateMaterialReceiptInput {
  purchaseOrderId: ID
  purchaseOrderNumber: String
  vendorId: ID
  vendorName: String
  receiptDate: String!
  warehouseId: ID
  warehouseName: String
  lineItems: [MRNLineItemInput!]!
  totalAmount: Float!
  notes: String
  organizationId: ID!
}

input UpdateMaterialReceiptInput {
  vendorId: ID
  vendorName: String
  receiptDate: String
  warehouseId: ID
  warehouseName: String
  lineItems: [MRNLineItemInput!]
  totalAmount: Float
  notes: String
}

extend type Query {
  materialreceipt(id: ID!): MaterialReceipt
  materialreceipts(organizationId: ID!, page: Int, limit: Int, status: String): [MaterialReceipt!]!
  materialreceiptsByPO(purchaseOrderId: ID!): [MaterialReceipt!]!
}

extend type Mutation {
  createMaterialReceipt(input: CreateMaterialReceiptInput!): MaterialReceipt!
  updateMaterialReceipt(id: ID!, input: UpdateMaterialReceiptInput!): MaterialReceipt!
  submitMaterialReceiptForApproval(id: ID!): MaterialReceipt!
  confirmMaterialReceipt(id: ID!): MaterialReceipt!
  cancelMaterialReceipt(id: ID!): MaterialReceipt!
  deleteMaterialReceipt(id: ID!): Boolean!
}
