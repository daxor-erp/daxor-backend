type GRNLineItem {
  itemDescription: String!
  orderedQty: Float!
  receivedQty: Float!
  unitPrice: Float
}

type GRN {
  id: ID!
  grnNumber: String!
  purchaseOrderId: ID
  vendorId: ID
  vendorName: String
  receivedDate: String!
  lineItems: [GRNLineItem!]!
  notes: String
  status: String!
  organizationId: ID!
  createdAt: String
}

input GRNLineItemInput {
  itemDescription: String!
  orderedQty: Float!
  receivedQty: Float!
  unitPrice: Float
}

input CreateGRNInput {
  purchaseOrderId: ID
  vendorId: ID
  vendorName: String
  receivedDate: String!
  lineItems: [GRNLineItemInput!]!
  notes: String
  organizationId: ID!
  """draft | submitted | approval_declined | confirmed (default draft)"""
  status: String
}

input UpdateGRNInput {
  status: String
  notes: String
  receivedDate: String
}

extend type Query {
  grn(id: ID!): GRN
  grns(organizationId: ID!, page: Int, limit: Int): [GRN!]!
  grnsByPO(purchaseOrderId: ID!): [GRN!]!
}

extend type Mutation {
  createGRN(input: CreateGRNInput!): GRN!
  updateGRN(id: ID!, input: UpdateGRNInput!): GRN!
  submitGRNForApproval(id: ID!): GRN!
  deleteGRN(id: ID!): Boolean!
}
