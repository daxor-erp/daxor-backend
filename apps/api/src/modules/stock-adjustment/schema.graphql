type SALineItem {
  itemId: ID
  itemDescription: String!
  currentQty: Float!
  adjustedQty: Float!
  difference: Float!
  unit: String
}

type StockAdjustment {
  id: ID!
  adjNumber: String!
  adjDate: String!
  warehouseId: ID
  warehouseName: String
  adjustmentType: String!
  lineItems: [SALineItem!]!
  reason: String
  status: String!
  notes: String
  organizationId: ID!
  createdAt: String
  updatedAt: String
}

input SALineItemInput {
  itemId: ID
  itemDescription: String!
  currentQty: Float!
  adjustedQty: Float!
  difference: Float!
  unit: String
}

input CreateStockAdjustmentInput {
  adjDate: String!
  warehouseId: ID
  warehouseName: String
  adjustmentType: String!
  lineItems: [SALineItemInput!]!
  reason: String
  notes: String
  organizationId: ID!
}

input UpdateStockAdjustmentInput {
  adjDate: String
  warehouseId: ID
  warehouseName: String
  adjustmentType: String
  lineItems: [SALineItemInput!]
  reason: String
  notes: String
}

extend type Query {
  stockadjustment(id: ID!): StockAdjustment
  stockadjustments(organizationId: ID!, page: Int, limit: Int): [StockAdjustment!]!
}

extend type Mutation {
  createStockAdjustment(input: CreateStockAdjustmentInput!): StockAdjustment!
  updateStockAdjustment(id: ID!, input: UpdateStockAdjustmentInput!): StockAdjustment!
  confirmStockAdjustment(id: ID!): StockAdjustment!
  cancelStockAdjustment(id: ID!): StockAdjustment!
  deleteStockAdjustment(id: ID!): Boolean!
}
