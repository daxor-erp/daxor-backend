type CustomerInvoice {
	id: ID!
	seqNo: String!
	customerId: ID!
	salesOrderId: ID
	invoiceDate: String!
	dueDate: String
	totalAmount: Float!
	paidAmount: Float
	outstandingAmount: Float!
	status: String!
	organizationId: ID!
	createdAt: String!
}

input CreateCustomerInvoiceInput {
	customerId: ID!
	salesOrderId: ID
	invoiceDate: String!
	dueDate: String
	totalAmount: Float!
	organizationId: ID!
}

input UpdateCustomerInvoiceInput {
	customerId: ID
	salesOrderId: ID
	invoiceDate: String
	dueDate: String
	totalAmount: Float
	paidAmount: Float
	status: String
}

extend type Query {
	customerinvoice(id: ID!): CustomerInvoice
	customerinvoices(organizationId: ID!, page: Int, limit: Int, status: String, customerId: ID): [CustomerInvoice!]!
}

extend type Mutation {
	createCustomerInvoice(input: CreateCustomerInvoiceInput!): CustomerInvoice!
	updateCustomerInvoice(id: ID!, input: UpdateCustomerInvoiceInput!): CustomerInvoice!
	deleteCustomerInvoice(id: ID!): CustomerInvoice!
	submitCustomerInvoiceForApproval(id: ID!): CustomerInvoice!
	"""Post revenue/AR journal and GL for an approved invoice (safe to retry)."""
	syncCustomerInvoiceAccounting(id: ID!): CustomerInvoice!
	"""Issue credit memo: reverse AR/revenue and update invoice balance."""
	applyCustomerCreditMemo(id: ID!, creditAmount: Float!, reason: String): CustomerInvoice!
}
