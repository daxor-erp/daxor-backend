type QuotationLineItem {
	itemId: ID
	description: String!
	quantity: Float!
	unitPrice: Float!
	discount: Float
	tax: Float
	total: Float!
}

input QuotationLineItemInput {
	itemId: ID
	description: String!
	quantity: Float!
	unitPrice: Float!
	discount: Float
	tax: Float
	total: Float!
}

type CustomerRef {
	id: ID!
	name: String!
	email: String
	docNumber: String
}

type Quotation {
	id: ID!
	seqNo: String
	quotationNumber: String!
	customerId: CustomerRef!
	"""Deprecated alias for customerId (legacy quotations)."""
	clientId: CustomerRef!
	subject: String!
	quotationDate: String!
	validUntil: String!
	lineItems: [QuotationLineItem!]!
	subtotal: Float!
	discountAmount: Float
	taxAmount: Float
	totalAmount: Float!
	terms: String
	notes: String
	status: String!
	sentAt: String
	sentBy: ID
	organizationId: ID!
	createdBy: ID
	createdAt: String!
	updatedAt: String!
}

type SendQuotationResult {
	quotation: Quotation!
	emailSent: Boolean!
}

input CreateQuotationInput {
	quotationNumber: String
	customerId: ID!
	"""Deprecated: use customerId."""
	clientId: ID
	subject: String!
	quotationDate: String!
	validUntil: String!
	lineItems: [QuotationLineItemInput!]!
	subtotal: Float!
	discountAmount: Float
	taxAmount: Float
	totalAmount: Float!
	terms: String
	notes: String
	status: String
	organizationId: ID!
}

input UpdateQuotationInput {
	customerId: ID
	clientId: ID
	subject: String
	quotationDate: String
	validUntil: String
	lineItems: [QuotationLineItemInput!]
	subtotal: Float
	discountAmount: Float
	taxAmount: Float
	totalAmount: Float
	terms: String
	notes: String
	status: String
}

extend type Query {
	quotation(id: ID!): Quotation
	quotations(organizationId: ID, page: Int, limit: Int, status: String): [Quotation!]!
	quotationsByOrganization(organizationId: ID!): [Quotation!]!
	quotationsByClient(clientId: ID!): [Quotation!]!
	quotationsByCustomer(customerId: ID!): [Quotation!]!
	quotationsByStatus(status: String!, organizationId: ID!): [Quotation!]!
}

extend type Mutation {
	createQuotation(input: CreateQuotationInput!): Quotation!
	updateQuotation(id: ID!, input: UpdateQuotationInput!): Quotation!
	deleteQuotation(id: ID!): Boolean!
	submitQuotationForApproval(id: ID!): Quotation!
	sendQuotation(id: ID!): SendQuotationResult!
}
