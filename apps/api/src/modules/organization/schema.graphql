type Organization {
	id: ID!
	seqNo: String!
	name: String!
	code: String
	address: String
	phone: String
	email: String
	status: String!
	createdAt: String!
}

input CreateOrganizationInput {
	name: String!
	code: String
	address: String
	phone: String
	email: String
	type: String
	contactPerson: String
}

"""Create a tenant organization and its first ORG_ADMIN user (platform admins only)."""
input CreateOrgAdminUserInput {
	email: String!
	firstName: String!
	lastName: String!
	password: String!
}

input CreateOrganizationWithOrgAdminInput {
	organization: CreateOrganizationInput!
	orgAdmin: CreateOrgAdminUserInput!
}

input UpdateOrganizationInput {
	name: String
	address: String
	phone: String
	email: String
	status: String
}

extend type Query {
	organization(id: ID!): Organization
	organizations(page: Int, limit: Int, search: String): [Organization!]!
}

extend type Mutation {
	createOrganization(input: CreateOrganizationInput!): Organization!
	createOrganizationWithOrgAdmin(input: CreateOrganizationWithOrgAdminInput!): Organization!
	updateOrganization(id: ID!, input: UpdateOrganizationInput!): Organization!
	deleteOrganization(id: ID!): Organization!
}
