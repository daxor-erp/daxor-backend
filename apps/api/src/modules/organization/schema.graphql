"""Which user under the organization acts as workflow approver for a given ERP module."""
type OrganizationModuleApprover {
	moduleKey: String!
	"""Legacy primary approver — mirrors first entry in approverUserIds when present."""
	approverUserId: ID
	"""All users designated by org admin who may approve this module (currently used for vendors; extensible elsewhere)."""
	approverUserIds: [ID!]!
}

input OrganizationModuleApproverInput {
	moduleKey: String!
	"""Set to omit or empty to clear the approver for this module."""
	approverUserId: ID
	"""Replace the full approver set for this module (non-null array, possibly empty clears all)."""
	approverUserIds: [ID!]
}

type Organization {
	id: ID!
	seqNo: String!
	name: String!
	code: String
	address: String
	phone: String
	email: String
	status: String!
	moduleApprovers: [OrganizationModuleApprover!]!
	createdAt: String!
}

input CreateOrganizationInput {
	name: String!
	code: String
	address: String
	phone: String
	email: String
	type: String
	contactPerson: String
}

"""Create a tenant organization and its first ORG_ADMIN user (platform admins only)."""
input CreateOrgAdminUserInput {
	email: String!
	firstName: String!
	lastName: String!
	password: String!
}

input CreateOrganizationWithOrgAdminInput {
	organization: CreateOrganizationInput!
	orgAdmin: CreateOrgAdminUserInput!
}

input UpdateOrganizationInput {
	name: String
	address: String
	phone: String
	email: String
	status: String
}

extend type Query {
	organization(id: ID!): Organization
	organizations(page: Int, limit: Int, search: String): [Organization!]!
}

extend type Mutation {
	createOrganization(input: CreateOrganizationInput!): Organization!
	createOrganizationWithOrgAdmin(input: CreateOrganizationWithOrgAdminInput!): Organization!
	updateOrganization(id: ID!, input: UpdateOrganizationInput!): Organization!
	deleteOrganization(id: ID!): Organization!
	"""Replace module-level approver assignments for an organization (org admin: own org only)."""
	setOrganizationModuleApprovers(organizationId: ID!, assignments: [OrganizationModuleApproverInput!]!): Organization!
}
