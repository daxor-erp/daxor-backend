type CashBank {
  id: ID!
  transactionNumber: String!
  transactionDate: String!
  transactionType: String!
  bankAccount: String!
  referenceModule: String!
  referenceId: String!
  amount: Float!
  currency: String!
  paymentMethod: String!
  chequeNumber: String
  description: String!
  reconciliationStatus: String!
  reconciliationDate: String
  organizationId: String!
  createdAt: String!
}

type BankAccount {
  id: ID!
  accountNumber: String!
  accountName: String!
  accountHolder: String
  bankName: String!
  branchName: String!
  accountType: String!
  currency: String!
  currentBalance: Float!
  isActive: Boolean!
  organizationId: String!
  createdAt: String!
}

input CashBankInput {
  transactionDate: String!
  transactionType: String!
  bankAccount: String!
  referenceModule: String!
  referenceId: String!
  amount: Float!
  currency: String
  paymentMethod: String!
  chequeNumber: String
  description: String!
  organizationId: String!
}

input BankAccountInput {
  accountNumber: String!
  accountName: String!
  accountHolder: String
  bankName: String!
  branchName: String!
  accountType: String!
  currency: String
  """Initial balance for the account. Used as currentBalance on create."""
  openingBalance: Float
  organizationId: String!
}

type BankStatementLine {
  id: ID!
  lineDate: String!
  amount: Float!
  lineKind: String!
  description: String!
  bankReference: String
  bankAccount: String!
  organizationId: String!
  isMatched: Boolean!
  matchedCashBankId: String
  createdAt: String!
}

input BankStatementLineInput {
  organizationId: String!
  bankAccount: String!
  lineDate: String!
  amount: Float!
  lineKind: String!
  description: String!
  bankReference: String
}

type ReconciliationRule {
  id: ID!
  name: String!
  organizationId: String!
  bankAccount: String
  priority: Int!
  isActive: Boolean!
  bankLineTextContains: String!
  bookLineTextContains: String!
  amountTolerance: Float!
  notes: String
  createdAt: String!
  updatedAt: String
}

input ReconciliationRuleInput {
  name: String!
  organizationId: String!
  bankAccount: String
  priority: Int
  isActive: Boolean
  bankLineTextContains: String
  bookLineTextContains: String
  amountTolerance: Float
  notes: String
}

input ReconciliationRulePatch {
  name: String
  bankAccount: String
  priority: Int
  isActive: Boolean
  bankLineTextContains: String
  bookLineTextContains: String
  amountTolerance: Float
  notes: String
}

input BankTransferInput {
  organizationId: String!
  transferDate: String!
  fromAccountNumber: String!
  toAccountNumber: String!
  amount: Float!
  currency: String
  description: String!
  paymentMethod: String
}

type BankTransferResult {
  transferId: String!
  fromCashBankId: String!
  toCashBankId: String!
  fromTransactionNumber: String!
  toTransactionNumber: String!
}

extend type Query {
  cashBank(id: ID!): CashBank
  cashBanks(organizationId: String!, page: Int, limit: Int, reconciliationStatus: String, bankAccount: String): [CashBank!]!
  bankAccount(id: ID!): BankAccount
  bankAccounts(organizationId: String!, page: Int, limit: Int): [BankAccount!]!
  bankStatementLines(organizationId: String!, bankAccount: String!, onlyUnmatched: Boolean): [BankStatementLine!]!
  reconciliationRules(organizationId: String!): [ReconciliationRule!]!
}

extend type Mutation {
  createCashBank(input: CashBankInput!): CashBank!
  reconcileCashBank(id: ID!): CashBank!
  createBankAccount(input: BankAccountInput!): BankAccount!
  updateBankAccount(id: ID!, input: BankAccountInput!): BankAccount!
  createBankStatementLine(input: BankStatementLineInput!): BankStatementLine!
  deleteBankStatementLine(id: ID!): Boolean!
  matchBankStatementLineToBook(bankStatementLineId: ID!, cashBankId: ID!): BankStatementLine!
  createReconciliationRule(input: ReconciliationRuleInput!): ReconciliationRule!
  updateReconciliationRule(id: ID!, input: ReconciliationRulePatch!): ReconciliationRule!
  deleteReconciliationRule(id: ID!): Boolean!
  transferBankFunds(input: BankTransferInput!): BankTransferResult!
}
