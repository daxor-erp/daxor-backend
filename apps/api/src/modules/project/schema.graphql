type Project {
	id: ID!
	seqNo: String
	name: String!
	description: String
	startDate: String
	endDate: String
	"""draft | submitted | approval_declined | approved — omitted on legacy rows means approved"""
	orgApprovalStatus: String!
	status: String!
	organizationId: ID!
	createdAt: String
}

input CreateProjectInput {
	name: String!
	description: String
	startDate: String
	endDate: String
	organizationId: ID!
}

input UpdateProjectInput {
	name: String
	description: String
	startDate: String
	endDate: String
	status: String
}

extend type Query {
	project(id: ID!): Project
	projects(organizationId: ID!, page: Int, limit: Int, search: String): [Project!]!
}

extend type Mutation {
	createProject(input: CreateProjectInput!): Project!
	updateProject(id: ID!, input: UpdateProjectInput!): Project!
	submitProjectForApproval(id: ID!): Project!
	deleteProject(id: ID!): Project!
}
