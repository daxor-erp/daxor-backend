type PayrollManagement {
  id: ID!
  docNumber: String!
  docDate: String!
  status: String!
  organizationId: String!
  createdAt: String!
  title: String
  remarks: String
  payPeriodStart: String
  payPeriodEnd: String
}

input PayrollManagementInput {
  docDate: String!
  status: String
  organizationId: String!
  title: String
  remarks: String
  payPeriodStart: String
  payPeriodEnd: String
}

extend type Query {
  payrollmanagement(id: ID!): PayrollManagement
  payrollmanagements(organizationId: String!, page: Int, limit: Int): [PayrollManagement!]!
}

extend type Mutation {
  createPayrollManagement(input: PayrollManagementInput!): PayrollManagement!
  updatePayrollManagement(id: ID!, input: PayrollManagementInput!): PayrollManagement!
  deletePayrollManagement(id: ID!): Boolean!
  submitPayrollManagementForApproval(id: ID!): PayrollManagement!
}
