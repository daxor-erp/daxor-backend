"""Unified workflow state stored on approvable ERP records (extend per module)."""
enum RecordApprovalWorkflowStatus {
	DRAFT
	PENDING_APPROVAL
	APPROVED
	REJECTED
}

enum ApprovalRequestStatus {
	PENDING
	APPROVED
	REJECTED
}

enum ApprovalDecision {
	APPROVED
	REJECTED
}

enum ApprovalRequestRole {
	REQUESTER
	APPROVER
	ANY
}

type ApprovalRequest {
	id: ID!
	organizationId: ID!
	moduleKey: String!
	entityType: String!
	entityId: ID!
	title: String!
	status: ApprovalRequestStatus!
	requesterUserId: ID!
	requesterDisplayName: String
	assigneeApproverUserId: ID!
	"""Hydrated assignee name for timelines and inbox previews."""
	assigneeDisplayName: String
	resolutionNote: String
	decidedByUserId: ID
	decidedAt: String
	createdAt: String
	updatedAt: String
}

extend type Query {
	"""Approval tasks assigned to the current user (same organization)."""
	myPendingApprovalRequests: [ApprovalRequest!]!

	"""
	Approval requests the current user is involved in, either as requester
	or as assigned approver. Filter by status and/or role.
	"""
	myApprovalRequests(
		status: ApprovalRequestStatus
		role: ApprovalRequestRole = ANY
		limit: Int = 50
		skip: Int = 0
	): [ApprovalRequest!]!
}

extend type Mutation {
	resolveApprovalRequest(id: ID!, decision: ApprovalDecision!, note: String): ApprovalRequest!
}
