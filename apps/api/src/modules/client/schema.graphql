type Client {
  id: ID!
  seqNo: String
  name: String!
  email: String!
  phone: String
  company: String
  address: String
  city: String
  state: String
  country: String
  zipCode: String
  website: String
  industry: String
  notes: String
  status: String!
  organizationId: ID!
  createdAt: String!
  updatedAt: String!
}

input CreateClientInput {
  name: String!
  email: String!
  phone: String
  company: String
  address: String
  city: String
  state: String
  country: String
  zipCode: String
  website: String
  industry: String
  notes: String
  status: String
  organizationId: ID!
}

input UpdateClientInput {
  name: String
  email: String
  phone: String
  company: String
  address: String
  city: String
  state: String
  country: String
  zipCode: String
  website: String
  industry: String
  notes: String
  status: String
}

extend type Query {
  client(id: ID!): Client
  clients: [Client!]!
  clientsByOrganization(organizationId: ID!): [Client!]!
  clientsByStatus(status: String!, organizationId: ID!): [Client!]!
}

extend type Mutation {
  createClient(input: CreateClientInput!): Client!
  updateClient(id: ID!, input: UpdateClientInput!): Client!
  deleteClient(id: ID!): Boolean!
}
